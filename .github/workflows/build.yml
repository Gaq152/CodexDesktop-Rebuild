name: Build & Release (Manual)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: false
        default: "all"
        type: choice
        options: [all, mac, windows]
      installer_version:
        description: "Optional Windows Squirrel package version override, for update testing"
        required: false
        default: ""
        type: string
      publish_update_feed:
        description: "For Windows-only builds, deploy RELEASES and nupkg to the update feed"
        required: false
        default: false
        type: boolean
      skip_windows_delta:
        description: "Build full Windows packages only, without delta packages"
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: "24"
  WINDOWS_UPDATE_TAG: "windows-update-feed"
  WINDOWS_UPDATE_FEED: "https://github.com/Gaq152/CodexDesktop-Rebuild/releases/download/windows-update-feed"

permissions:
  contents: read

jobs:
  build-mac:
    if: inputs.platform == 'all' || inputs.platform == 'mac'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
      - run: |
          brew install --quiet sevenzip
      - run: node scripts/sync-upstream.js --force --skip-win
      - run: node scripts/patch-all.js mac-${{ matrix.arch }}
      - run: npm run build:mac-${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-macOS-${{ matrix.arch }}
          path: out/*.dmg
          if-no-files-found: error

  build-windows:
    if: inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest
    outputs:
      windows_portable_version: ${{ steps.windows_artifacts.outputs.windows_portable_version }}
      windows_installer_version: ${{ steps.windows_artifacts.outputs.windows_installer_version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
      - run: |
          choco install 7zip -y
      - name: Add 7zz alias
        run: |
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "C:\Program Files\7-Zip\7zz.exe"
          echo "C:\Program Files\7-Zip" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - run: node scripts/sync-upstream.js --force --skip-mac
      - name: Configure Windows update feed
        shell: pwsh
        run: |
          $feed = "${{ env.WINDOWS_UPDATE_FEED }}"
          "CODEX_REBUILD_UPDATE_URL=$feed" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          Write-Host "Using Windows update feed URL: $feed"
          if ("${{ inputs.skip_windows_delta }}" -eq "true") {
            "CODEX_REBUILD_NO_DELTA=1" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
            Write-Host "Building full Windows packages only."
          } else {
            "CODEX_REBUILD_REMOTE_RELEASES=$feed" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
            Write-Host "Using Windows update feed as Squirrel remoteReleases for delta generation."
          }
      - name: Configure installer version override
        if: inputs.installer_version != ''
        shell: pwsh
        run: |
          "CODEX_REBUILD_INSTALLER_VERSION=${{ inputs.installer_version }}" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
      - run: node scripts/patch-all.js win
      - run: npm run build:win-x64
      - name: Build Windows installer with diagnostics
        timeout-minutes: 30
        env:
          DEBUG: electron-windows-installer:*
        run: npm run build:win-installer
      - name: Resolve Windows artifact versions
        id: windows_artifacts
        run: node scripts/resolve-release-artifacts.js --root out --rename-windows-setup --github-output
      - name: Prepare Windows update feed artifact
        run: node scripts/prepare-windows-update-feed.js --source out/make/squirrel.windows/x64 --dest out/update-feed
      - name: Upload Windows portable zip
        uses: actions/upload-artifact@v7
        with:
          name: Codex-Windows-Portable-x64-${{ steps.windows_artifacts.outputs.windows_portable_version }}
          path: |
            out/*.zip
            out/make/zip/win32/x64/*.zip
          if-no-files-found: error
      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: Codex-Windows-Installer-x64-${{ steps.windows_artifacts.outputs.windows_installer_version }}
          path: out/make/squirrel.windows/x64/*.exe
          if-no-files-found: error
      - name: Upload Windows update feed
        uses: actions/upload-artifact@v7
        with:
          name: Codex-Windows-UpdateFeed-x64
          path: out/update-feed/*
          if-no-files-found: error

  release:
    needs: [build-mac, build-windows]
    if: always() && inputs.platform == 'all' && needs.build-mac.result == 'success' && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Get upstream version
        id: version
        run: |
          set -euo pipefail
          node scripts/check-update.js --json --force > upstream.json

          node <<'NODE'
          const fs = require("fs");
          const upstream = JSON.parse(fs.readFileSync("upstream.json", "utf8"));
          const platforms = upstream.platforms || {};
          const macArm64 = platforms["macOS-arm64"]?.version || "";
          const macX64 = platforms["macOS-x64"]?.version || "";
          const windows = platforms.Windows?.version || "";
          const version = macArm64 || macX64 || windows;

          if (!version) {
            console.error("No upstream version detected.");
            process.exit(1);
          }

          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            [
              `version=${version}`,
              `mac_arm64=${macArm64}`,
              `mac_x64=${macX64}`,
              `windows=${windows}`,
            ].join("\n") + "\n",
          );

          console.log(`Release version: ${version}`);
          NODE

      - name: Update tracked upstream versions
        run: |
          set -euo pipefail
          PACKAGE_VERSION="${{ steps.version.outputs.mac_arm64 || steps.version.outputs.mac_x64 || steps.version.outputs.windows }}"
          PACKAGE_VERSION=$(node -e "const v=process.argv[1]||''; const m=v.match(/^(\d+\.\d+\.\d+)\.\d+$/); console.log(m ? m[1] : v)" "$PACKAGE_VERSION")
          node scripts/resolve-sync-plan.js \
            --upstream upstream.json \
            --previous scripts/upstream-versions.json \
            --write-current scripts/upstream-versions.json \
            --json
          node -e "
            const fs=require('fs'), p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='$PACKAGE_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json scripts/upstream-versions.json
          if ! git diff --cached --quiet; then
            git commit -m "Bump upstream versions to ${{ steps.version.outputs.version }}"
            git push origin HEAD
          else
            echo "No version metadata change"
          fi

      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display artifact structure
        run: find artifacts -maxdepth 4 -type f -print

      - name: Resolve release artifact versions
        id: artifacts
        run: node scripts/resolve-release-artifacts.js --root artifacts --github-output

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.artifacts.outputs.release_version }}
          name: Codex ${{ steps.artifacts.outputs.release_version }}
          body: |
            Manual macOS and Windows rebuild from upstream Codex.

            | Platform / artifact | Version |
            | --- | --- |
            | macOS arm64 | `${{ steps.artifacts.outputs.mac_arm64_version || 'N/A' }}` |
            | macOS x64 | `${{ steps.artifacts.outputs.mac_x64_version || 'N/A' }}` |
            | Windows x64 portable | `${{ steps.artifacts.outputs.windows_portable_version || 'N/A' }}` |
            | Windows x64 installer | `${{ steps.artifacts.outputs.windows_installer_version || 'N/A' }}` |
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.nupkg
            artifacts/**/RELEASES
          fail_on_unmatched_files: true
          draft: false
          make_latest: true

      - name: Prepare Windows update feed
        run: |
          set -euo pipefail
          node scripts/prepare-windows-update-feed.js --source artifacts --dest update-feed/updates/win32/x64
          find update-feed -type f -print

      - name: Publish Windows update feed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ env.WINDOWS_UPDATE_TAG }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "Windows update feed" --notes "Squirrel.Windows update feed for CodexDesktop-Rebuild." --latest=false
          fi
          feed_dir="update-feed/updates/win32/x64"
          desired_assets="$(mktemp)"
          (
            find "$feed_dir" -maxdepth 1 -type f -name '*.nupkg' -printf '%f\n'
            printf 'RELEASES\n'
          ) | sort > "$desired_assets"
          gh release upload "$tag" "$feed_dir"/*.nupkg --clobber
          gh release upload "$tag" "$feed_dir/RELEASES" --clobber
          gh release view "$tag" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            if ! grep -Fxq "$asset" "$desired_assets"; then
              gh release delete-asset "$tag" "$asset" -y
            fi
          done

  publish-windows-update-feed:
    needs: [build-windows]
    if: always() && inputs.platform == 'windows' && inputs.publish_update_feed == true && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: Codex-Windows-UpdateFeed-x64
          path: artifacts/Codex-Windows-UpdateFeed-x64

      - name: Prepare Windows update feed
        run: |
          set -euo pipefail
          node scripts/prepare-windows-update-feed.js --source artifacts --dest update-feed/updates/win32/x64
          find update-feed -type f -print

      - name: Publish Windows update feed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ env.WINDOWS_UPDATE_TAG }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "Windows update feed" --notes "Squirrel.Windows update feed for CodexDesktop-Rebuild." --latest=false
          fi
          feed_dir="update-feed/updates/win32/x64"
          desired_assets="$(mktemp)"
          (
            find "$feed_dir" -maxdepth 1 -type f -name '*.nupkg' -printf '%f\n'
            printf 'RELEASES\n'
          ) | sort > "$desired_assets"
          gh release upload "$tag" "$feed_dir"/*.nupkg --clobber
          gh release upload "$tag" "$feed_dir/RELEASES" --clobber
          gh release view "$tag" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            if ! grep -Fxq "$asset" "$desired_assets"; then
              gh release delete-asset "$tag" "$asset" -y
            fi
          done
