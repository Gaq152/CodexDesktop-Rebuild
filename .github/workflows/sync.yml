name: Sync Upstream & Patch

on:
  schedule:
    - cron: "0 8 * * *" # Daily 08:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even without version change"
        type: boolean
        default: false

env:
  NODE_VERSION: "24"
  WINDOWS_UPDATE_TAG: "windows-update-feed"
  WINDOWS_UPDATE_FEED: "https://github.com/Gaq152/CodexDesktop-Rebuild/releases/download/windows-update-feed"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.detect.outputs.has_update }}
      mac_changed: ${{ steps.detect.outputs.mac_changed }}
      windows_changed: ${{ steps.detect.outputs.windows_changed }}
      mac_arm64_version: ${{ steps.detect.outputs.mac_arm64_version }}
      mac_x64_version: ${{ steps.detect.outputs.mac_x64_version }}
      windows_version: ${{ steps.detect.outputs.windows_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check upstream versions
        id: detect
        run: |
          set -euo pipefail
          node scripts/check-update.js --json --force > upstream.json

          args=(--upstream upstream.json --previous scripts/upstream-versions.json --github-output --json)
          if [ "${{ inputs.force }}" = "true" ]; then
            args+=(--force)
          fi
          node scripts/resolve-sync-plan.js "${args[@]}"

  # ──────────────────────────────────────────────
  # Each platform: sync + patch + build in one job
  # (src/ is gitignored, so it must be generated per-runner)
  # ──────────────────────────────────────────────
  build-mac:
    needs: check
    if: needs.check.outputs.mac_changed == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Install tools
        run: |
          brew install --quiet sevenzip

      - name: Sync upstream (macOS only)
        run: node scripts/sync-upstream.js --force --skip-win

      - name: Patch
        run: node scripts/patch-all.js mac-${{ matrix.arch }}

      - name: Build
        run: npm run build:mac-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Codex-macOS-${{ matrix.arch }}
          path: out/*.dmg
          if-no-files-found: error

  build-windows:
    needs: check
    if: needs.check.outputs.windows_changed == 'true'
    runs-on: windows-latest
    outputs:
      windows_portable_version: ${{ steps.windows_artifacts.outputs.windows_portable_version }}
      windows_installer_version: ${{ steps.windows_artifacts.outputs.windows_installer_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Install tools
        run: |
          choco install 7zip -y

      - name: Add 7zz alias
        run: |
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "C:\Program Files\7-Zip\7zz.exe"
          echo "C:\Program Files\7-Zip" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Sync upstream (Windows only)
        run: node scripts/sync-upstream.js --force --skip-mac

      - name: Configure Windows update feed
        shell: pwsh
        run: |
          $feed = "${{ env.WINDOWS_UPDATE_FEED }}"
          "CODEX_REBUILD_UPDATE_URL=$feed" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          try {
            Invoke-WebRequest "$feed/RELEASES" -Method Head -UseBasicParsing -TimeoutSec 20 | Out-Null
            "CODEX_REBUILD_REMOTE_RELEASES=$feed" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
            Write-Host "Using previous Squirrel feed for delta packages: $feed"
          } catch {
            Write-Host "No previous Squirrel feed found; building full package only."
          }

      - name: Patch
        run: node scripts/patch-all.js win

      - name: Build
        run: npm run build:win-x64

      - name: Build installer
        run: npm run build:win-installer

      - name: Resolve Windows artifact versions
        id: windows_artifacts
        run: node scripts/resolve-release-artifacts.js --root out --rename-windows-setup --github-output

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Codex-Windows-x64-${{ steps.windows_artifacts.outputs.windows_portable_version }}
          path: |
            out/*.zip
            out/make/squirrel.windows/x64/*.exe
            out/make/squirrel.windows/x64/RELEASES
            out/make/squirrel.windows/x64/*.nupkg
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Bump version + tag + release
  # ──────────────────────────────────────────────
  release:
    needs: [check, build-mac, build-windows]
    if: always() && needs.check.result == 'success' && needs.check.outputs.has_update == 'true' && (needs.build-mac.result == 'success' || needs.build-mac.result == 'skipped') && (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') && (needs.build-mac.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Get upstream version and tag
        id: version
        run: |
          set -euo pipefail
          node scripts/check-update.js --json --force > upstream.json

          MAC_ARM64="${{ needs.check.outputs.mac_arm64_version }}"
          MAC_X64="${{ needs.check.outputs.mac_x64_version }}"
          WIN_VER="${{ needs.check.outputs.windows_version }}"
          if [ "${{ needs.check.outputs.mac_changed }}" = "true" ]; then
            VERSION="${MAC_ARM64:-$MAC_X64}"
          else
            VERSION="$WIN_VER"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "mac_arm64=$MAC_ARM64" >> "$GITHUB_OUTPUT"
          echo "mac_x64=$MAC_X64" >> "$GITHUB_OUTPUT"
          echo "win_version=$WIN_VER" >> "$GITHUB_OUTPUT"

          if [ -z "$VERSION" ]; then echo "No version detected"; exit 0; fi
          PACKAGE_VERSION="${MAC_ARM64:-${MAC_X64:-$WIN_VER}}"
          PACKAGE_VERSION=$(node -e "const v=process.argv[1]||''; const m=v.match(/^(\d+\.\d+\.\d+)\.\d+$/); console.log(m ? m[1] : v)" "$PACKAGE_VERSION")
          node scripts/resolve-sync-plan.js \
            --upstream upstream.json \
            --previous scripts/upstream-versions.json \
            --write-current scripts/upstream-versions.json \
            --json

          node -e "
            const fs=require('fs'), p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='$PACKAGE_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json scripts/upstream-versions.json
          if ! git diff --cached --quiet; then
            git commit -m "Bump upstream versions to ${VERSION}"
            git push origin HEAD
          else
            echo "No version metadata change"
          fi

          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "Tag v${VERSION} already exists"
          else
            git tag -a "v${VERSION}" -m "Codex ${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display structure
        run: ls -lhR artifacts/

      - name: Resolve release artifact versions
        id: artifacts
        run: node scripts/resolve-release-artifacts.js --root artifacts --github-output

      - name: Create Release
        if: steps.version.outputs.version != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.artifacts.outputs.release_version || steps.version.outputs.version }}
          name: Codex ${{ steps.artifacts.outputs.release_version || steps.version.outputs.version }}
          body: |
            ## Build Artifact Versions
            | Platform / artifact | Status | Version |
            |----------|---------|---------|
            | macOS arm64 | ${{ needs.build-mac.result == 'success' && 'Built in this release' || 'Unchanged, use previous release' }} | `${{ steps.artifacts.outputs.mac_arm64_version || needs.check.outputs.mac_arm64_version || 'N/A' }}` |
            | macOS x64 | ${{ needs.build-mac.result == 'success' && 'Built in this release' || 'Unchanged, use previous release' }} | `${{ steps.artifacts.outputs.mac_x64_version || needs.check.outputs.mac_x64_version || 'N/A' }}` |
            | Windows x64 portable | ${{ needs.build-windows.result == 'success' && 'Built in this release' || 'Unchanged, use previous release' }} | `${{ steps.artifacts.outputs.windows_portable_version || needs.check.outputs.windows_version || 'N/A' }}` |
            | Windows x64 installer | ${{ needs.build-windows.result == 'success' && 'Built in this release' || 'Unchanged, use previous release' }} | `${{ steps.artifacts.outputs.windows_installer_version || needs.check.outputs.windows_version || 'N/A' }}` |
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.nupkg
            artifacts/**/RELEASES
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Windows update feed
        if: steps.version.outputs.version != '' && needs.build-windows.result == 'success'
        run: |
          set -euo pipefail
          node scripts/prepare-windows-update-feed.js --source artifacts --dest update-feed/updates/win32/x64
          find update-feed -type f -print

      - name: Publish Windows update feed
        if: steps.version.outputs.version != '' && needs.build-windows.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ env.WINDOWS_UPDATE_TAG }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "Windows update feed" --notes "Squirrel.Windows update feed for CodexDesktop-Rebuild." --latest=false
          fi
          feed_dir="update-feed/updates/win32/x64"
          desired_assets="$(mktemp)"
          (
            find "$feed_dir" -maxdepth 1 -type f -name '*.nupkg' -printf '%f\n'
            printf 'RELEASES\n'
          ) | sort > "$desired_assets"
          gh release upload "$tag" "$feed_dir"/*.nupkg --clobber
          gh release upload "$tag" "$feed_dir/RELEASES" --clobber
          gh release view "$tag" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            if ! grep -Fxq "$asset" "$desired_assets"; then
              gh release delete-asset "$tag" "$asset" -y
            fi
          done
