name: Promote Windows Release

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: GitHub Actions run ID containing the Windows artifacts
        required: true
        type: string
      release_version:
        description: Exact Windows release version to promote
        required: true
        type: string

permissions:
  actions: read
  contents: write

env:
  WINDOWS_UPDATE_TAG: windows-update-feed
  WINDOWS_UPDATE_FEED: "https://github.com/Gaq152/CodexDesktop-Rebuild/releases/download/windows-update-feed"

concurrency:
  group: codex-windows-release-state
  cancel-in-progress: false

jobs:
  promote:
    name: Promote Windows artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Validate promotion inputs
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release_version: expected numeric X.Y.Z" >&2
            exit 1
          fi
          if [[ ! "$SOURCE_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "Invalid source_run_id: expected digits only" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Windows installer
        uses: actions/download-artifact@v7
        with:
          name: Codex-Windows-Installer-x64-${{ inputs.release_version }}
          path: artifacts/installer
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Download Windows portable archive
        uses: actions/download-artifact@v7
        with:
          name: Codex-Windows-Portable-x64-${{ inputs.release_version }}
          path: artifacts/portable
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Download Windows update feed
        uses: actions/download-artifact@v7
        with:
          name: Codex-Windows-UpdateFeed-x64
          path: artifacts/update-feed
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Download Windows release metadata
        uses: actions/download-artifact@v7
        with:
          name: Codex-Windows-Release-Metadata-x64-${{ inputs.release_version }}
          path: artifacts/metadata
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Resolve Windows installer version
        id: installer_artifacts
        run: node scripts/resolve-release-artifacts.js --root artifacts/installer --github-output

      - name: Resolve Windows portable version
        id: portable_artifacts
        run: node scripts/resolve-release-artifacts.js --root artifacts/portable --github-output

      - name: Resolve Windows full package version
        id: package_artifacts
        run: node scripts/resolve-release-artifacts.js --root artifacts/update-feed --github-output

      - name: Validate exact Windows artifact versions
        env:
          EXPECTED_VERSION: ${{ inputs.release_version }}
          INSTALLER_VERSION: ${{ steps.installer_artifacts.outputs.windows_installer_version }}
          PORTABLE_VERSION: ${{ steps.portable_artifacts.outputs.windows_portable_version }}
          PACKAGE_VERSION: ${{ steps.package_artifacts.outputs.windows_installer_version }}
        run: |
          set -euo pipefail
          for pair in \
            "installer:$INSTALLER_VERSION" \
            "portable:$PORTABLE_VERSION" \
            "full package:$PACKAGE_VERSION"
          do
            kind="${pair%%:*}"
            actual="${pair#*:}"
            if [ -z "$actual" ] || [ "$actual" != "$EXPECTED_VERSION" ]; then
              echo "Expected $kind version $EXPECTED_VERSION, found ${actual:-missing}" >&2
              exit 1
            fi
          done

      - name: Validate Windows update feed integrity
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: node scripts/validate-windows-release-feed.js --root artifacts/update-feed --version "$RELEASE_VERSION"

      - name: Validate promotion metadata and monotonic state
        id: metadata
        env:
          EXPECTED_VERSION: ${{ inputs.release_version }}
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          remote_releases="$(mktemp)"
          trap 'rm -f "$remote_releases"' EXIT
          status="$(curl --silent --show-error --location --output "$remote_releases" --write-out '%{http_code}' "${WINDOWS_UPDATE_FEED}/RELEASES?verify=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}")"
          case "$status" in
            200) ;;
            404) : > "$remote_releases" ;;
            *) echo "Unable to read current Windows update feed: HTTP $status" >&2; exit 1 ;;
          esac
          node scripts/windows-release-metadata.js \
            --metadata artifacts/metadata/windows-release-metadata.json \
            --validate-promotion \
            --expected-release-version "$EXPECTED_VERSION" \
            --package package.json \
            --tracked scripts/upstream-versions.json \
            --local-releases artifacts/update-feed/RELEASES \
            --remote-releases "$remote_releases" \
            --github-output
          run_sha="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}" --jq '.head_sha')"
          metadata_sha="$(node -e "console.log(require('./artifacts/metadata/windows-release-metadata.json').sourceSha)")"
          if [ "$run_sha" != "$metadata_sha" ]; then
            echo "Metadata source SHA $metadata_sha does not match run $SOURCE_RUN_ID head SHA $run_sha" >&2
            exit 1
          fi

      - name: Record promoted Windows versions
        env:
          WINDOWS_RELEASE_VERSION: ${{ steps.metadata.outputs.windows_release_version }}
          WINDOWS_UPSTREAM_VERSION: ${{ steps.metadata.outputs.windows_upstream_version }}
        run: |
          set -euo pipefail
          node scripts/configure-windows-release-version.js \
            --upstream-version "$WINDOWS_UPSTREAM_VERSION" \
            --release-version "$WINDOWS_RELEASE_VERSION" \
            --write-package package.json \
            --write-tracked scripts/upstream-versions.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json scripts/upstream-versions.json
          if ! git diff --cached --quiet; then
            git commit -m "Bump Windows version to $WINDOWS_UPSTREAM_VERSION"
            git push origin HEAD
          else
            echo "No Windows version metadata change"
          fi

      - name: Create or update Windows-only release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: codex-win-${{ inputs.release_version }}
          name: Codex Win ${{ inputs.release_version }}
          target_commitish: master
          body: |
            Windows-only release promoted from GitHub Actions run `${{ inputs.source_run_id }}`.

            - Portable ZIP: `Codex-win-x64-${{ inputs.release_version }}.zip`
            - Installer ZIP: `CodexSetup-win-x64-${{ inputs.release_version }}.zip`
            - The installer executable is inside the ZIP to avoid direct `.exe` browser download blocking.
            - Squirrel update packages are published separately to `windows-update-feed`.
          files: |
            artifacts/installer/CodexSetup-win-x64-${{ inputs.release_version }}.zip
            artifacts/portable/Codex-win-x64-${{ inputs.release_version }}.zip
          fail_on_unmatched_files: true
          overwrite_files: true
          draft: false
          prerelease: false
          make_latest: true

      - name: Publish Windows update feed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$WINDOWS_UPDATE_TAG"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "Windows update feed" --notes "Squirrel.Windows update feed for CodexDesktop-Rebuild." --latest=false
          fi
          desired_assets="$(mktemp)"
          (
            find artifacts/update-feed -maxdepth 1 -type f -name '*.nupkg' -printf '%f\n'
            printf 'RELEASES\n'
          ) | sort > "$desired_assets"
          gh release upload "$tag" artifacts/update-feed/*.nupkg --clobber
          gh release upload "$tag" artifacts/update-feed/RELEASES --clobber
          gh release view "$tag" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            if ! grep -Fxq "$asset" "$desired_assets"; then
              gh release delete-asset "$tag" "$asset" -y
            fi
          done

      - name: Reconcile exact release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: codex-win-${{ inputs.release_version }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          desired_assets="$(mktemp)"
          actual_assets="$(mktemp)"
          trap 'rm -f "$desired_assets" "$actual_assets"' EXIT
          printf '%s\n' \
            "CodexSetup-win-x64-${RELEASE_VERSION}.zip" \
            "Codex-win-x64-${RELEASE_VERSION}.zip" \
            > "$desired_assets"
          sort -o "$desired_assets" "$desired_assets"

          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' \
            | while IFS= read -r asset; do
                if ! grep -Fxq "$asset" "$desired_assets"; then
                  gh release delete-asset "$RELEASE_TAG" "$asset" -y
                fi
              done

          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' \
            | sort > "$actual_assets"
          if ! cmp -s "$desired_assets" "$actual_assets"; then
            echo "Release asset reconciliation failed for $RELEASE_TAG" >&2
            diff -u "$desired_assets" "$actual_assets" >&2 || true
            exit 1
          fi
